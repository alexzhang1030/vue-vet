name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmarks:
    name: SFC analysis benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: extractions/setup-just@v3
      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --version 5.0.1 --locked
      - name: Build benchmarks
        run: just bench-codspeed-build
      - name: Run CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: just bench-codspeed-run
